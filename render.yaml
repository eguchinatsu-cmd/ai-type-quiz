services:
  - type: web
    name: ai-type-quiz
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: GA_MEASUREMENT_ID
        value: "G-YCJX82FD05"
